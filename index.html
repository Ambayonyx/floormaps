<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YAML Page Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="floorplan.css">
</head>
<body>

<div id="pageTitle">YAML Page Viewer</div>

<div id="topHeader">
    <button id="chooseYaml">Load floorplan.yaml</button>
    <input id="yamlFile" type="file" accept=".yaml,.yml" style="display:none">

    <div class="selector-panel">
        <select id="buildingSelector"></select>
    </div>

    <div class="selector-panel">
        <select id="floorSelector"></select>
    </div>
</div>

<div id="viewerWrapper">
    <img id="viewer" alt="Floor map" src="">
</div>

<p id="instruction">If you opened this page from the filesystem, click the button and choose <code>floorplan.yaml</code> from the same folder.</p>

<script src="floorplan.js"></script>

</body>
</html>
